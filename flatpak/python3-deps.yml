# Vendored wheels (offline pip). Edit here, then mirror into:
#   io.github.crashman79.sinkswitch.yml and io.github.crashman79.sinkswitch-flathub.yml
# x86_64 and aarch64 use different PyQt6 lines because PyPI does not publish identical PyQt6
# versions for both platforms.
#
# Regenerate URLs/hashes after bumping versions:
#   see flatpak/README.md section "Refreshing Flathub Python wheels"

- name: python3-deps-x86_64
  only-arches: [x86_64]
  buildsystem: simple
  build-commands:
    - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
      --prefix=${FLATPAK_DEST} --no-build-isolation
      "PyYAML==6.0.3" "certifi==2026.2.25" "PyQt6==6.9.1"
