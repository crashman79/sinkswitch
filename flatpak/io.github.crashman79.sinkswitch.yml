# Flatpak manifest for SinkSwitch (build from repository root):
#   flatpak install flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
#   flatpak-builder --user --install --force-clean build-dir flatpak/io.github.crashman79.sinkswitch.yml
#
# Flathub: replace the pip step with flatpak-pip-generator output (no network at build time).

id: io.github.crashman79.sinkswitch
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: sinkswitch

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=session-bus
  - --device=dri
  # Bundled pactl uses the Pulse proxy to the host PipeWire/Pulse session
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0:rw
  - --filesystem=~/.config/sinkswitch:create
  - --filesystem=~/.cache/sinkswitch:create
  # pw-cli still runs on the host
  - --talk-name=org.freedesktop.Flatpak

modules:
  # Debian .deb clients: reproducible URLs; host distro (Arch, etc.) does not matter.
  - name: pulseaudio-client
    buildsystem: simple
    build-commands:
      - |
        set -e
        case "$(uname -m)" in
          x86_64) LIBDIR=lib/x86_64-linux-gnu ;;
          aarch64) LIBDIR=lib/aarch64-linux-gnu ;;
          *) echo "Unsupported CPU: $(uname -m)"; exit 1 ;;
        esac
        ar x pulseaudio-utils.deb && tar xf data.tar.xz
        ar x libpulse0.deb && tar xf data.tar.xz
        ar x libasyncns0.deb && tar xf data.tar.xz
        install -Dm755 usr/bin/pactl ${FLATPAK_DEST}/bin/pactl
        install -d ${FLATPAK_DEST}/${LIBDIR}/pulseaudio
        cp -a usr/${LIBDIR}/libpulse.so.0* ${FLATPAK_DEST}/${LIBDIR}/
        cp -a usr/${LIBDIR}/pulseaudio/libpulsecommon-17.0.so ${FLATPAK_DEST}/${LIBDIR}/pulseaudio/
        cp -a usr/${LIBDIR}/libasyncns.so.0* ${FLATPAK_DEST}/${LIBDIR}/
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://deb.debian.org/debian/pool/main/p/pulseaudio/pulseaudio-utils_17.0+dfsg1-2+b1_amd64.deb
        dest-filename: pulseaudio-utils.deb
        sha256: 4894448f98ea126b112682a3212c199e2c404d7429209a570eeb1bf6b567bfd9
      - type: file
        only-arches: [x86_64]
        url: https://deb.debian.org/debian/pool/main/p/pulseaudio/libpulse0_17.0+dfsg1-2+b1_amd64.deb
        dest-filename: libpulse0.deb
        sha256: 786aca79119cb249562708fd24dcdf817604cfe75bbfcb8cda3464042e17f40e
      - type: file
        only-arches: [aarch64]
        url: https://deb.debian.org/debian/pool/main/p/pulseaudio/pulseaudio-utils_17.0+dfsg1-2+b1_arm64.deb
        dest-filename: pulseaudio-utils.deb
        sha256: 0a617395416f70892ff06fe7c2a6b28db1f66f7fe722f63fd5cc7fb4beba37d1
      - type: file
        only-arches: [aarch64]
        url: https://deb.debian.org/debian/pool/main/p/pulseaudio/libpulse0_17.0+dfsg1-2+b1_arm64.deb
        dest-filename: libpulse0.deb
        sha256: 2de5610e3affe69cfb11110f890375261b47c9e0fc1a81eef7ecc4d6d2dc9a6d
      - type: file
        only-arches: [x86_64]
        url: https://deb.debian.org/debian/pool/main/liba/libasyncns/libasyncns0_0.8-6+b3_amd64.deb
        dest-filename: libasyncns0.deb
        sha256: cadaff99f4178b1f580331045621b363abaaefc994e78eecba1857774a3cead2
      - type: file
        only-arches: [aarch64]
        url: https://deb.debian.org/debian/pool/main/liba/libasyncns/libasyncns0_0.8-6+b3_arm64.deb
        dest-filename: libasyncns0.deb
        sha256: 30ec77ed3695fc09863427bf30e27318b74909089144ac24db17c3ab1f184a62

  - name: sinkswitch
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --verbose --exists-action=i --prefix=${FLATPAK_DEST} -r flatpak/python-requirements.txt
      - install -d ${FLATPAK_DEST}/lib/sinkswitch
      - cp -a run_app.py requirements.txt ${FLATPAK_DEST}/lib/sinkswitch/
      - cp -a src data ${FLATPAK_DEST}/lib/sinkswitch/
      - |
        VERSION=$(sed -n 's/.*<release version="\([^"]*\)"[^>]*>.*/\1/p' flatpak/io.github.crashman79.sinkswitch.metainfo.xml | head -1)
        if [ -z "${VERSION}" ]; then VERSION="0.0.0"; fi
        printf '# Generated by Flatpak build\n__version__ = "%s"\n' "${VERSION}" > ${FLATPAK_DEST}/lib/sinkswitch/src/_version.py
      - install -Dm755 flatpak/entrypoint.sh ${FLATPAK_DEST}/bin/sinkswitch
      - install -Dm644 flatpak/io.github.crashman79.sinkswitch.desktop ${FLATPAK_DEST}/share/applications/io.github.crashman79.sinkswitch.desktop
      - install -Dm644 flatpak/io.github.crashman79.sinkswitch.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.crashman79.sinkswitch.metainfo.xml
      - install -Dm644 data/icons/io.github.crashman79.sinkswitch.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.crashman79.sinkswitch.svg
      - install -Dm644 data/icons/io.github.crashman79.sinkswitch.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.crashman79.sinkswitch.png
    sources:
      - type: dir
        path: ..
