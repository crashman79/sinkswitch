# Basic Audio Routing Configuration Example
# 
# NOTE: This is a REFERENCE example. The system automatically generates routing
# rules based on your connected devices. To see your actual auto-generated config:
#   cat ~/.config/pipewire-router/config/routing_rules.yaml
#
# To regenerate based on current devices:
#   ~/.config/pipewire-router/venv/bin/python3 \
#     ~/.config/pipewire-router/src/audio_router.py \
#     generate-config --output ~/.config/pipewire-router/config/routing_rules.yaml

routing_rules:
  # Example: Route browsers to Bluetooth headset
  - name: "Browsers Apps to Bluetooth"
    applications:
      - "firefox"
      - "chrome"
      - "chromium"
      - "opera"
    # Replace with your actual device ID from: pactl list sinks | grep "Name:"
    target_device: "bluez_output.XX_XX_XX_XX_XX_XX.1"
    enable_default_fallback: true

  # Example: Route meetings to Bluetooth headset
  - name: "Meetings Apps to Bluetooth"
    applications:
      - "zoom"
      - "teams"
      - "discord"
      - "skype"
    target_device: "bluez_output.XX_XX_XX_XX_XX_XX.1"
    enable_default_fallback: true

  # Example: Route music to Bluetooth speaker
  - name: "Music Apps to Bluetooth"
    applications:
      - "spotify"
      - "vlc"
      - "rhythmbox"
    target_device: "bluez_output.XX_XX_XX_XX_XX_XX.1"
    enable_default_fallback: true
